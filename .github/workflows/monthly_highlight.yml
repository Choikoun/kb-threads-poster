name: 월간 하이라이트 (매월 1일 10시)

on:
  schedule:
    - cron: '0 1 1 * *'   # 매월 1일 10:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: monthly-highlight
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests
      - name: 월간 하이라이트 포스팅
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python monthly_highlight.py
