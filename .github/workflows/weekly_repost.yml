name: 주간 재발행 - 지난달 인기글 (수요일)

on:
  schedule:
    - cron: '0 11 * * 3'   # 매주 수요일 20:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests
      - name: 재발행
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python repost_top.py
      - name: 재발행 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repost_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "재발행 로그 업데이트"
          git pull --rebase
          git push
