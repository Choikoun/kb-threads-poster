name: 일일 트렌드 수집

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00 KST (UTC 22:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 트렌드 수집 실행
        run: python fetch_trends.py

      - name: 일일 브리핑 생성
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python generate_briefing.py

      - name: 파일 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_trends.md daily_briefing.md
          git diff --staged --quiet || git commit -m "일일 브리핑: $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          git pull --rebase
          git push
