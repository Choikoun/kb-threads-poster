name: 일일 트렌드 수집

on:
  schedule:
    - cron: '9 22 * * *'   # 매일 07:00 KST 무렵
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 트렌드 수집 실행
        run: |
          for i in 1 2 3; do
            python fetch_trends.py && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1

      - name: 일일 브리핑 생성
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            python generate_briefing.py && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1

      - name: 파일 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_trends.md daily_briefing.md
          git diff --staged --quiet || git commit -m "일일 브리핑: $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push 충돌 — 재시도 $attempt/5"; sleep $((attempt * 5))
          done
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

