name: 뉴스 자동포스팅 - 저녁 8시 (국무회의·현안)

on:
  schedule:
    - cron: '5 11 * * *'   # 매일 20:00 KST 무렵
  workflow_dispatch:
    inputs:
      category:
        description: '카테고리'
        default: 'government'

concurrency:
  group: news-government
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv
      - name: 국무회의·현안 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          for i in 1 2 3; do
            python news_auto_poster.py government && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 콘텐츠 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.jsonlog.driver "python merge_json_log.py %O %A %B"
          git add content_log.json
          git diff --staged --quiet || git commit -m "콘텐츠 로그 업데이트"
          git pull --rebase
          git push
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
