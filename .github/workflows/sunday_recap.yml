name: 일요일 주간 TOP 글 요약 (일 10시)

on:
  schedule:
    - cron: '0 1 * * 0'   # 일요일 10:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: sunday-recap
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests
      - name: 이번 주 TOP 글 요약 포스팅
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python sunday_recap.py
