name: AI 일러스트 카드 포스팅 - 법인·사업주

on:
  schedule:
    - cron: '0 13 * * *'   # 매일 22:00 KST
  workflow_dispatch:

concurrency:
  group: news-ai-card
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post_ai_card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv Pillow
      - name: AI 일러스트 카드 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python ai_illustration_poster.py
      - name: 콘텐츠 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_log.json
          git diff --staged --quiet || git commit -m "콘텐츠 로그 업데이트"
          git pull --rebase
          git push
