name: 이미지 카드 포스팅 - 법인·사업주 (AI 일러스트 / 실사 격일)

on:
  schedule:
    - cron: '8 13 * * *'   # 매일 22:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: news-ai-card
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  post_ai_card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv Pillow
      - name: 포맷 결정 (홀짝일 교대)
        id: format
        run: |
          DAY=$(TZ=Asia/Seoul date +%j)
          if [ $((10#$DAY % 2)) -eq 0 ]; then
            echo "script=ai_illustration_poster.py" >> "$GITHUB_OUTPUT"
          else
            echo "script=stock_card_poster.py" >> "$GITHUB_OUTPUT"
          fi
      - name: 이미지 카드 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          for i in 1 2 3; do
            python ${{ steps.format.outputs.script }} && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - name: 콘텐츠 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_log.json
          git diff --staged --quiet || git commit -m "콘텐츠 로그 업데이트"
          git pull --rebase
          git push
