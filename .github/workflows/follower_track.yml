name: 팔로워 수 일별 추적 + 마일스톤 포스팅

on:
  schedule:
    - cron: '0 12 * * *'   # 매일 21:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests python-dotenv
      - name: 팔로워 추적
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python follower_tracker.py
      - name: 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add follower_history.json milestone_log.json
          git diff --staged --quiet || git commit -m "팔로워 추적 로그 업데이트"
          git pull --rebase
          git push
