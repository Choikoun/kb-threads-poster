name: 주간 조회수 분석

on:
  schedule:
    - cron: '15 22 * * 1'   # 매주 월요일 07:00 KST 무렵
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests python-dotenv google-genai

      - name: 주간 분석 실행
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python weekly_analysis.py | tee weekly_report.txt

      - name: 재발행 후보 파일 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reblog_candidates.json follower_history.json format_weights.json content_log.json source_weights.json hook_weights.json slot_config.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "주간 분석: 재발행 후보 갱신 ($(TZ=Asia/Seoul date +'%Y-%m-%d'))"
          git pull --rebase
          git push

      - name: 분석 결과 이슈 생성
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "주간 조회수 분석 ($(TZ=Asia/Seoul date +'%Y-%m-%d'))" \
            --body-file weekly_report.txt
