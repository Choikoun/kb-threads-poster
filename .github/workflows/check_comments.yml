name: 댓글 체크 알림

on:
  schedule:
    - cron: '2 12 * * *'   # 매일 21:00 KST 무렵
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests python-dotenv

      - name: 댓글 체크
        id: check
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          python check_comments.py > comment_check.txt
          cat comment_check.txt
          if grep -q "새 외부 댓글 없음" comment_check.txt; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 새 댓글 알림 이슈 생성
        if: steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "새 외부 댓글 발견 ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body-file comment_check.txt
