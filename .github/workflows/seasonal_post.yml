name: 시즌 이슈 자동 포스팅

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seasonal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests google-genai python-dotenv
      - name: 시즌 이슈 체크 및 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python seasonal_poster.py
      - name: 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seasonal_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "시즌 포스팅 로그 업데이트"
          git pull --rebase || true
          git push || true
