name: 인스타그램 릴스 포스팅 (수요일 20:00 KST)

on:
  schedule:
    - cron: '17 11 * * 3'   # 매주 수요일 20:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: instagram-reels
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post_reels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ffmpeg 설치
        run: sudo apt-get install -y ffmpeg
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv Pillow edge-tts
      - name: 릴스 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python instagram_reels_poster.py
      - name: 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram_log.json content_log.json
          git diff --staged --quiet || git commit -m "인스타 릴스 로그 업데이트"
          git pull --rebase
          git push
