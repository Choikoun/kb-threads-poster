name: 국세청·기재부 세법 변경 감지 포스팅

on:
  schedule:
    - cron: '0 1 * * *'    # 매일 10:00 KST
    - cron: '0 7 * * *'    # 매일 16:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gov_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai python-dotenv
      - name: 세법 뉴스 감지 및 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python gov_news_poster.py
      - name: 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gov_news_log.json
          git diff --staged --quiet || git commit -m "세법 뉴스 로그 업데이트"
          git pull --rebase
          git push
