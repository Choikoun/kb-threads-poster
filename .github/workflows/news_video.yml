name: 주간 비디오 포스팅 - 법인·사업주 (Ken Burns + TTS)

on:
  schedule:
    - cron: '0 11 * * 6'   # 매주 토요일 20:00 KST
  workflow_dispatch:

concurrency:
  group: news-video
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post_video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ffmpeg 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv Pillow edge-tts
      - name: 비디오 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python video_poster.py
      - name: 콘텐츠 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_log.json
          git diff --staged --quiet || git commit -m "콘텐츠 로그 업데이트 (비디오)"
          git pull --rebase
          git push
