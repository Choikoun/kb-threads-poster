name: 주간 비디오 포스팅 - 법인·사업주 (Ken Burns + TTS)

on:
  schedule:
    - cron: '27 11 * * 6'   # 매주 토요일 20:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: news-video
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  post_video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ffmpeg 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv Pillow edge-tts
      - name: 비디오 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2; do
            python video_poster.py && exit 0
            if [ $i -lt 2 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - name: 콘텐츠 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_log.json
          git diff --staged --quiet || git commit -m "콘텐츠 로그 업데이트 (비디오)"
          git pull --rebase
          git push
