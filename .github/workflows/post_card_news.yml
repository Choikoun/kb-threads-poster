name: 카드뉴스 자동 포스팅

on:
  schedule:
    # UTC 기준 (KST = UTC+9) — 매일 2회
    - cron: '0 3 * * *'    # 12:00 KST (점심)
    - cron: '0 12 * * *'   # 21:00 KST (저녁)
  workflow_dispatch:
    inputs:
      target:
        description: '수동 실행 타겟 (의사/자산가/사업주/개인, 생략 시 자동)'
        required: false

permissions:
  contents: write

jobs:
  post_card:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pillow requests python-dotenv

      - name: 폰트 디렉토리 확인
        run: ls fonts/

      - name: 카드뉴스 포스팅 실행
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          CARD_TARGET: ${{ github.event.inputs.target }}
        run: python card_auto_poster.py

      - name: 변경된 큐 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards_queue.json
          git diff --staged --quiet || git commit -m "카드뉴스 발행 완료: $(date +'%Y-%m-%d %H:%M KST')"
          git push
