name: 수동글 - 법인 가지급금 (6/17)

on:
  schedule:
    - cron: '3 10 17 6 *'   # 2026-06-17 19:03 KST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests
      - name: 포스팅
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python post_gaejipgeum.py
