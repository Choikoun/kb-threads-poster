name: 댓글 감지 알림 (매일)

on:
  schedule:
    - cron: '7 0 * * *'   # 매일 09:00 KST 무렵
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests python-dotenv
      - name: 댓글 감지
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python comment_monitor.py
      - name: 댓글 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comment_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "댓글 로그 업데이트"
          git pull --rebase
          git push
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 댓글 감지 실패 ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "comment_monitor.py 실행 실패. [로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
