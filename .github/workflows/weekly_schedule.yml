name: 주간 포스팅 스케줄 Issue 생성 (월요일)

on:
  schedule:
    - cron: '0 23 * * 0'   # 매주 월요일 08:00 KST (일요일 23:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests
      - name: 주간 스케줄 Issue 생성
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python weekly_schedule.py
