name: KTV 국무회의 모니터링

on:
  schedule:
    - cron: '22 6 * * *'   # 15:00 KST (오후 3시) 무렵 매일
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests youtube-transcript-api

      - name: 최신 큐 동기화
        run: git pull origin main --rebase

      - name: KTV 모니터링 실행
        run: |
          for i in 1 2 3; do
            python ktv_monitor.py && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ktv_briefing.md ktv_latest.json
          git diff --staged --quiet || git commit -m "KTV 국무회의 브리핑 업데이트: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

