name: 증여 설계 이야기 시리즈 (화/목 14시)

on:
  schedule:
    - cron: '0 5 * * 2,4'   # 화/목 14:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: inheritance-series
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post_series:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests google-genai python-dotenv
      - name: 증여 설계 이야기 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python inheritance_poster.py
      - name: 콘텐츠 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_log.json series_log.json
          git diff --staged --quiet || git commit -m "콘텐츠 로그 업데이트"
          git pull --rebase
          git push
