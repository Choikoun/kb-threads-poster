name: 중임등기 도구 주간 홍보 (일 19시)

on:
  schedule:
    - cron: '0 10 * * 0'   # 일요일 19:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: tool-promo-poster
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv
      - name: 도구 홍보 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python tool_promo_poster.py
