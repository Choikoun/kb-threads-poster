name: 중임등기 도구 홍보 (일·수 19시)

on:
  schedule:
    - cron: '0 10 * * 0,3'   # 일·수요일 19:00 KST 무렵 (2026-07-07 주2회로 증편)
  workflow_dispatch:

concurrency:
  group: tool-promo-poster
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv
      - name: 도구 홍보 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            python tool_promo_poster.py && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
