name: 주간 시리즈 - 이번 주 사업주들이 물어본 것 (금 19시)

on:
  schedule:
    - cron: '0 10 * * 5'   # 금요일 19:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: weekly-qa-poster
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv
      - name: 주간 Q&A 시리즈 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python weekly_qa_poster.py
