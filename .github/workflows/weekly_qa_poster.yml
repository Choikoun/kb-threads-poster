name: 주간 시리즈 - 이번 주 사업주들이 물어본 것 (금 19시)

on:
  schedule:
    - cron: '0 10 * * 5'   # 금요일 19:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: weekly-qa-poster
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv
      - name: 주간 Q&A 시리즈 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            python weekly_qa_poster.py && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 회차 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qa_series_log.json
          git diff --staged --quiet || git commit -m "Q&A 시리즈 회차 업데이트"
          git pull --rebase
          git push
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
