name: 시즌 이슈 포스팅 (매일 09:00 KST)

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: seasonal-poster
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  post_seasonal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests google-genai python-dotenv
      - name: 시즌 이슈 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python seasonal_poster.py
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - name: 시즌 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seasonal_log.json
          git diff --staged --quiet || git commit -m "시즌 로그 업데이트"
          git pull --rebase
          git push
