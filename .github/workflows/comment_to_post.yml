name: 댓글→초안 생성 (수 11시)

on:
  schedule:
    - cron: '0 2 * * 3'   # 수요일 11:00 KST 무렵
  workflow_dispatch:

concurrency:
  group: comment-to-post
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests google-genai python-dotenv
      - name: 댓글 기반 초안 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          for i in 1 2 3; do
            python comment_to_post.py && exit 0
            if [ $i -lt 3 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 초안 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post_drafts.json
          git diff --staged --quiet || git commit -m "포스팅 초안 업데이트"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push 충돌 — 재시도 $attempt/5"; sleep $((attempt * 5))
          done
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
