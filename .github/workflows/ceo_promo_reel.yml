name: 중임등기 도구 인스타 릴스 홍보 (토 20시)

on:
  schedule:
    - cron: '11 11 * * 6'   # 토요일 20:11 KST 무렵 (정규 릴스 20:00 슬롯과 겹침 최소화)
  workflow_dispatch:

concurrency:
  group: ceo-promo-reel
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  promo_reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ffmpeg 설치
        run: sudo apt-get install -y ffmpeg
      - name: 패키지 설치
        run: pip install requests feedparser google-genai beautifulsoup4 python-dotenv Pillow edge-tts qrcode
      - name: 홍보 릴스 포스팅
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2; do
            python ceo_promo_reel.py && exit 0
            if [ $i -lt 2 ]; then echo "시도 $i 실패, 30초 후 재시도..."; sleep 30; fi
          done
          exit 1
      - name: 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.jsonlog.driver "python merge_json_log.py %O %A %B"
          git add instagram_log.json
          git diff --staged --quiet || git commit -m "중임등기 홍보 릴스 로그 업데이트"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            git rebase --abort 2>/dev/null || true
            echo "push 충돌 — 재시도 $attempt/5"; sleep $((attempt * 5))
          done
      - name: 실패 알림
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ 포스팅 실패: ${{ github.workflow }} ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))" \
            --body "[로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
